# Build config for the Enatega (DoorDash-clone) web app on Netlify.
# This is an older create-react-app (react-scripts 4) project, so we pin a
# compatible Node version, disable CI warnings-as-errors, and serve build/.
# The app uses HashRouter, so no SPA redirect rule is needed.

[build]
  command = "CI=false npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20.18.0"
  NODE_OPTIONS = "--openssl-legacy-provider"
  NPM_FLAGS = "--legacy-peer-deps"
